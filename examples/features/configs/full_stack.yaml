# ─────────────────────────────────────────────────────────────────────
# Multimodal Feature Engineering Configuration — Full Stack
#
# All available modalities: base scores, annotations, genomic context,
# conservation (PhyloP/PhastCons), epigenetic marks (H3K36me3/H3K4me3),
# and junction reads (RNA-seq splice evidence).
# Use this when preparing training data for the meta-layer.
#
# Usage:
#   python 06_multimodal_genome_workflow.py --config configs/full_stack.yaml
#   python 06_multimodal_genome_workflow.py --config configs/full_stack.yaml \
#       --chromosomes all --resume
# ─────────────────────────────────────────────────────────────────────

pipeline:
  base_model: openspliceai
  output_format: parquet
  verbosity: 1

  modalities:
    - base_scores                   # +43 columns: probabilities, gradients, peaks, context
    - annotation                    # +3 columns: splice_type, transcript info
    - sequence                      # +3 columns: DNA window, start, end (enables gc_content)
    - genomic                       # +4 columns: position, distances, GC content
    - conservation                  # +9 columns: PhyloP/PhastCons scores + context stats
    - epigenetic                    # +12 columns: histone marks across tissues (Strategy B)
    - junction                      # +12 columns: RNA-seq junction evidence (GTEx v8, 353K junctions)
    - rbp_eclip                     # +8 columns: RBP eCLIP binding (ENCODE, K562/HepG2)
    - chrom_access                  # +6 columns: ATAC-seq accessibility (ENCODE, cross-tissue)

modality_configs:
  base_scores:
    context_window: 2
    include_gradients: true
    include_comparative: true

  annotation:
    include_transcript_info: true

  sequence:
    window_size: 500               # ±500bp = 1001nt window (matches meta-spliceai)

  genomic:
    gc_window: 100
    include_dinucleotides: false

  conservation:
    tracks:
      - phylop                      # per-base evolutionary rate (range ~[-20, 10])
      - phastcons                   # conserved element probability ([0, 1])
    window: 10                      # half-window for context stats (total = 2*window+1)
    remote_fallback: true

  epigenetic:
    marks:
      - h3k36me3                    # exon body mark (SETD2-deposited during transcription)
      - h3k4me3                     # active promoter mark
    cell_lines:                     # minimal 5-tissue panel (ENCODE Tier 1 + liver + skin)
      - K562                        # blood/CML
      - GM12878                     # lymphoblastoid
      - H1                          # embryonic stem cells
      - HepG2                       # liver
      - keratinocyte                # skin (primary cells)
    window: 200                     # half-window (bp) — broader than conservation (~nucleosome)
    exon_intron_window: 500         # half-window for exon/intron boundary ratio
    aggregation: summarized         # cross-tissue stats (Strategy B): max, mean, breadth, var
    breadth_threshold: 1.5          # fold-change cutoff for tissue_breadth count
    remote_fallback: true

  junction:
    min_support: 3                  # minimum unique reads to count a junction
    aggregation: summarized         # cross-tissue stats: breadth, variance, PSI
    breadth_threshold: 3            # reads per tissue to count toward breadth
    include_psi: true               # simplified PSI (dominance among competitors)
    # junction_data_path: null      # auto-resolved from registry (junctions.tsv)

  rbp_eclip:
    aggregation: summarized         # cross-RBP summary stats
    cell_lines:                     # ENCODE eCLIP cell lines
      - K562                        # blood/CML (eCLIP Tier 1)
      - HepG2                       # liver (eCLIP Tier 1)
    min_neg_log10_pvalue: 2.0       # -log10(0.01) — IDR-filtered peaks only
    batch_size: 5000                # positions per batch in interval overlap
    # eclip_data_path: null         # auto-resolved from registry

  chrom_access:
    cell_lines:
      - K562                        # blood/CML
      - GM12878                     # lymphoblastoid
      - HepG2                       # liver
      - A549                        # lung adenocarcinoma
      - IMR-90                      # normal fibroblast
    window: 150                     # half-window (bp) — ATAC peaks ~200bp (nucleosome scale)
    aggregation: summarized         # cross-tissue stats: max, mean, breadth, variance
    signal_threshold: 2.0           # fold-change cutoff for tissue_breadth count
    peak_threshold: 3.0             # fold-change cutoff for binary has_peak feature
    remote_fallback: true

sampling:
  enabled: true
  early: true                       # sample BEFORE feature engineering (~100x faster)
  score_threshold: 0.01
  proximity_window: 0
  background_rate: 0.005
  random_seed: 42

workflow:
  chromosomes:
    - chr22
  chunk_size: 200
