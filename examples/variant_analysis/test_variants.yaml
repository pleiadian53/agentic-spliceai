    strand: "-"

  # CFTR: Cystic fibrosis donor (plus-strand)
  - chrom: chr7
    pos: 117480148
    ref: G
    alt: A
    gene: CFTR
    strand: "+"

  # CFTR: Cystic fibrosis acceptor (plus-strand, G-of-AG)
  - chrom: chr7
    pos: 117509033
