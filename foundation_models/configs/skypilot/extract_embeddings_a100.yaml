# SkyPilot: Extract Evo2 40B embeddings on A100 80GB
#
# Usage:
#   sky launch foundation_models/configs/skypilot/extract_embeddings_a100.yaml
#
#   # Download results to local machine (before tearing down!)
#   rsync -Pavz extract-emb-40b:/workspace/output/ ./output/embeddings/
#
#   # Tear down
#   sky down extract-emb-40b -y

name: extract-emb-40b

workdir: .

resources:
  accelerators: A100-80GB:1
  cloud: runpod

file_mounts:
  /workspace/data: ./data/mane/GRCh38

setup: |
  set -e
  pip install -e .
  pip install -e ./foundation_models
  pip install evo2

run: |
  set -e
  mkdir -p /workspace/output
  python examples/foundation_models/03_embedding_extraction.py \
    --genes BRCA1 TP53 BRCA2 RB1 CFTR EGFR PTEN MLH1 MSH2 APC \
    --model evo2 --model-size 40b \
    --output /workspace/output/

  echo ""
  echo "============================================"
  echo "DONE — download results before tearing down:"
  echo "  rsync -Pavz extract-emb-40b:/workspace/output/ ./output/embeddings/"
  echo "  sky down extract-emb-40b -y"
  echo "============================================"
