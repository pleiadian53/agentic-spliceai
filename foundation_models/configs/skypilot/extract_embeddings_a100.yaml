# SkyPilot: Extract Evo2 40B embeddings on A100 80GB
#
# Usage:
#   sky launch foundation_models/configs/skypilot/extract_embeddings_a100.yaml
#
#   # Download results to local machine (before tearing down!)
#   sky rsync extract-emb-40b /workspace/output/ ./output/embeddings/
#
#   # Tear down
#   sky down extract-emb-40b

name: extract-emb-40b

resources:
  accelerators: A100-80GB:1
  cloud: runpod

file_mounts:
  /workspace/data:
    source: ./data/mane/GRCh38/
    mode: COPY

setup: |
  pip install -e .
  pip install -e ./foundation_models

run: |
  mkdir -p /workspace/output
  python foundation_models/examples/02_extract_embeddings.py \
    --data-dir /workspace/data/ \
    --chromosomes 22 \
    --output /workspace/output/embeddings_chr22_40b.h5

  echo ""
  echo "============================================"
  echo "DONE — download results before tearing down:"
  echo "  sky rsync extract-emb-40b /workspace/output/ ./output/embeddings/"
  echo "  sky down extract-emb-40b"
  echo "============================================"
