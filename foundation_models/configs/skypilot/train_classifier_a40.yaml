# SkyPilot: Train ExonClassifier on A40 (from pre-computed embeddings)
#
# Prerequisites:
#   Embeddings must already exist locally at ./output/embeddings/
#   (produced by extract_embeddings_a40.yaml or extract_embeddings_a100.yaml)
#
# Usage:
#   sky launch foundation_models/configs/skypilot/train_classifier_a40.yaml
#
#   # Download results to local machine (before tearing down!)
#   rsync -Pavz train-classifier:/workspace/checkpoints/ ./output/checkpoints/
#
#   # Tear down
#   sky down train-classifier -y

name: train-classifier

workdir: .

resources:
  accelerators: A40:1
  cloud: runpod
  image_id: docker:nvcr.io/nvidia/pytorch:25.02-py3

file_mounts:
  /workspace/data: ./data/mane/GRCh38
  /workspace/embeddings: ./output/embeddings

setup: |
  set -e
  pip install -e .
  pip install -e ./foundation_models

run: |
  set -e
  mkdir -p data/mane
  ln -sfn /workspace/data data/mane/GRCh38
  mkdir -p /workspace/checkpoints
  python examples/foundation_models/04_train_and_evaluate.py \
    --embeddings /workspace/embeddings/embeddings.h5 \
    --labels /workspace/embeddings/embeddings.labels.npz \
    --output /workspace/checkpoints/ \
    --architecture mlp \
    --window-size 1024 \
    --epochs 50 \
    --patience 10

  echo ""
  echo "============================================"
  echo "DONE — download results before tearing down:"
  echo "  rsync -Pavz train-classifier:/workspace/checkpoints/ ./output/checkpoints/"
  echo "  sky down train-classifier -y"
  echo "============================================"
