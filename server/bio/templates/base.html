<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgenticSpliceAI Lab{% endblock %}</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        /* Navigation */
        .nav {
            background: linear-gradient(135deg, #1e3a5f 0%, #152a45 100%);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .nav-brand {
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 0.25rem;
        }

        .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        /* Header */
        .page-header {
            background: linear-gradient(135deg, #3572a5 0%, #1e3a5f 100%);
            padding: 2rem;
            color: white;
        }

        .page-header h1 {
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }

        .page-header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h2 {
            color: #1e3a5f;
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        /* Form elements */
        select, input[type="text"], input[type="search"] {
            padding: 0.5rem 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        select:focus, input[type="text"]:focus, input[type="search"]:focus {
            outline: none;
            border-color: #3572a5;
        }

        /* Buttons */
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3572a5 0%, #1e3a5f 100%);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 3px 10px rgba(30, 58, 95, 0.3);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #e9ecef;
            color: #495057;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            flex: 1;
            min-width: 150px;
        }

        .stat-card .stat-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stat-card .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3a5f;
            margin-top: 0.25rem;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            padding: 0.75rem;
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e9ecef;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

        thead th:hover {
            color: #1e3a5f;
        }

        tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: #f5f8fc;
        }

        tbody td {
            padding: 0.65rem 0.75rem;
            font-size: 0.9rem;
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e9ecef;
        }

        .pagination button {
            padding: 0.4rem 0.75rem;
            border: 1px solid #dee2e6;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            border-color: #3572a5;
            color: #1e3a5f;
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination .page-info {
            font-size: 0.85rem;
            color: #666;
            padding: 0 0.5rem;
        }

        /* Loading spinner */
        .loading-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.8);
            z-index: 10;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3572a5;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Utility */
        .text-muted { color: #999; }
        .text-right { text-align: right; }
        .mono { font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 0.85em; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">AgenticSpliceAI Lab</a>
        <div class="nav-links">
            <a href="/" class="{% block nav_genes %}{% endblock %}">Genes</a>
            <a href="/metrics" class="{% block nav_metrics %}{% endblock %}">Metrics</a>
            <a href="/genome/TP53" class="{% block nav_genome %}{% endblock %}">Genome</a>
            <a href="/pipeline" class="{% block nav_pipeline %}{% endblock %}">Pipeline</a>
        </div>
    </nav>

    {% block header %}{% endblock %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
